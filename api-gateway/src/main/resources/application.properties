# ==================== LOGGING ====================
logging.level.iuh.fit.apigateway=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=WARN

# ==================== TIMEOUT ====================
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

resilience4j.timelimiter.instances.auth-service.timeoutDuration=10s
resilience4j.timelimiter.instances.user-service.timeoutDuration=10s
resilience4j.timelimiter.instances.notification-service.timeoutDuration=10s
resilience4j.timelimiter.instances.chat-service.timeoutDuration=10s
resilience4j.timelimiter.instances.chat-conversations-service.timeoutDuration=5s
resilience4j.timelimiter.instances.ai-service.timeoutDuration=25s

resilience4j.timelimiter.instances.media-service.timeoutDuration=10s
resilience4j.timelimiter.instances.analytic-service.timeoutDuration=10s
resilience4j.timelimiter.instances.moderation-service.timeoutDuration=10s
