resilience4j.circuitbreaker.instances.ai-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ai-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.ai-service.automaticTransitionFromOpenToHalfOpenEnabled=true
