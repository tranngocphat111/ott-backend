resilience4j.circuitbreaker.instances.notification-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.notification-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.notification-service.failureRateThreshold=80
resilience4j.circuitbreaker.instances.notification-service.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.chat-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.chat-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.chat-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.chat-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.chat-service.automaticTransitionFromOpenToHalfOpenEnabled=true
