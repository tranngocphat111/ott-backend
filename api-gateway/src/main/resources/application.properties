spring.application.name=api-gateway

# ==================== CORS ====================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[0]=${FRONTEND_URL:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[1]=${FRONTEND_URL_ALT:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[2]=${FRONTEND_URL_DEPLOYED:https://*.vercel.app}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[3]=${FRONTEND_URL_LOCAL:http://127.0.0.1:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[4]=http://localhost:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[5]=http://127.0.0.1:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns[6]=https://*.vercel.app


spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[5]=HEAD
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[6]=PATCH

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# ==================== Discovery ====================
spring.cloud.gateway.discovery.locator.enabled=false

# ==================== AUTH SERVICE ====================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/riff/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=auth-service
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# ==================== USER SERVICE ====================
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/riff/api/users/**
 spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
 spring.cloud.gateway.routes[1].filters[0].args.name=user-service
 spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/user

# ==================== NOTIFICATION SERVICE ====================
spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=${NOTIF_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/riff/api/notifications/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=notification-service
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/notification
spring.cloud.gateway.routes[2].filters[1].name=RewritePath
spring.cloud.gateway.routes[2].filters[1].args.regexp=/riff/api/notifications/(?<segment>.*)
spring.cloud.gateway.routes[2].filters[1].args.replacement=/notification/riff/api/notifications/${segment}

# ==================== AI SERVICE ====================
spring.cloud.gateway.routes[4].id=ai-service
spring.cloud.gateway.routes[4].uri=${CHAT_SERVICE_URL:http://localhost:5000}
spring.cloud.gateway.routes[4].predicates[0]=Path=/riff/api/ai/**,/riff/api/chat/ai/**
spring.cloud.gateway.routes[4].filters[0].name=RewritePath
spring.cloud.gateway.routes[4].filters[0].args.regexp=/riff/api(?:/chat)?/ai/(?<segment>.*)
spring.cloud.gateway.routes[4].filters[0].args.replacement=/api/ai/$\{segment}
spring.cloud.gateway.routes[4].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[1].args.name=ai-service
spring.cloud.gateway.routes[4].filters[1].args.fallbackUri=forward:/fallback/chat

# ==================== CHAT CONVERSATION READ ====================
spring.cloud.gateway.routes[5].id=chat-conversations-service
spring.cloud.gateway.routes[5].uri=${CHAT_SERVICE_URL:http://localhost:5000}
spring.cloud.gateway.routes[5].predicates[0]=Path=/riff/api/chat/participants/*
spring.cloud.gateway.routes[5].predicates[1]=Method=GET
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/riff/api/chat/(?<segment>.*), /api/$\{segment}
spring.cloud.gateway.routes[5].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[1].args.name=chat-conversations-service
spring.cloud.gateway.routes[5].filters[1].args.fallbackUri=forward:/fallback/chat

# ==================== CHAT SERVICE ====================
spring.cloud.gateway.routes[9].id=chat-service
spring.cloud.gateway.routes[9].uri=${CHAT_SERVICE_URL:http://localhost:5000}
spring.cloud.gateway.routes[9].predicates[0]=Path=/riff/api/chat/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/riff/api/chat/(?<segment>.*), /api/$\{segment}
spring.cloud.gateway.routes[9].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[9].filters[1].args.name=chat-service
spring.cloud.gateway.routes[9].filters[1].args.fallbackUri=forward:/fallback/chat

# ==================== CHAT SOCKET ====================
spring.cloud.gateway.routes[6].id=chat-socket
spring.cloud.gateway.routes[6].uri=${CHAT_SERVICE_URL:http://localhost:5000}
spring.cloud.gateway.routes[6].predicates[0]=Path=/socket.io/**


# ==================== MEDIA SERVICE ====================
spring.cloud.gateway.routes[3].id=media-service
spring.cloud.gateway.routes[3].uri=${MEDIA_SERVICE_URL:http://localhost:8090}
spring.cloud.gateway.routes[3].predicates[0]=Path=/riff/api/media/**
spring.cloud.gateway.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=media-service
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/media
spring.cloud.gateway.routes[3].filters[1].name=RewritePath
spring.cloud.gateway.routes[3].filters[1].args.regexp=/riff/api/media/(?<segment>.*)
spring.cloud.gateway.routes[3].filters[1].args.replacement=/media/api/${segment}

# ==================== ANALYTIC SERVICE ====================
spring.cloud.gateway.routes[7].id=analytic-service
spring.cloud.gateway.routes[7].uri=${ANALYTIC_SERVICE_URL:http://ott-analytic:8092}
spring.cloud.gateway.routes[7].predicates[0]=Path=/riff/api/v1/admin/analytics/**,/riff/api/v1/analytics/**
spring.cloud.gateway.routes[7].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[7].filters[0].args.name=analytic-service
spring.cloud.gateway.routes[7].filters[0].args.fallbackUri=forward:/fallback/analytic
spring.cloud.gateway.routes[7].filters[1].name=RewritePath
spring.cloud.gateway.routes[7].filters[1].args.regexp=/riff/api/(?<segment>v1/.*)
spring.cloud.gateway.routes[7].filters[1].args.replacement=/api/${segment}
spring.cloud.gateway.routes[7].filters[2].name=RequestRateLimiter
spring.cloud.gateway.routes[7].filters[2].args.redis-rate-limiter.replenishRate=${ANALYTIC_RATE_LIMIT_REPLENISH_RATE:20}
spring.cloud.gateway.routes[7].filters[2].args.redis-rate-limiter.burstCapacity=${ANALYTIC_RATE_LIMIT_BURST_CAPACITY:40}
spring.cloud.gateway.routes[7].filters[2].args.redis-rate-limiter.requestedTokens=${ANALYTIC_RATE_LIMIT_REQUESTED_TOKENS:1}
spring.cloud.gateway.routes[7].filters[2].args.key-resolver=#{@userKeyResolver}

# ==================== MODERATION SERVICE ====================
spring.cloud.gateway.routes[8].id=moderation-service
spring.cloud.gateway.routes[8].uri=${MODERATION_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.routes[8].predicates[0]=Path=/riff/api/v1/moderation/**
spring.cloud.gateway.routes[8].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[8].filters[0].args.name=moderation-service
spring.cloud.gateway.routes[8].filters[0].args.fallbackUri=forward:/fallback/moderation
spring.cloud.gateway.routes[8].filters[1].name=RewritePath
spring.cloud.gateway.routes[8].filters[1].args.regexp=/riff/api/v1/moderation/(?<segment>.*)
spring.cloud.gateway.routes[8].filters[1].args.replacement=/moderation/${segment}

# ==================== SERVER ====================
server.port=8080

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}

# ==================== APP ====================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ==================== REDIS RATE LIMITER ====================
spring.data.redis.host=${GATEWAY_REDIS_HOST:${REDIS_HOST:redis}}
spring.data.redis.port=${GATEWAY_REDIS_PORT:${REDIS_PORT:6379}}
spring.data.redis.password=${GATEWAY_REDIS_PASSWORD:${REDIS_PASSWORD:}}

# ==================== RESILIENCE4J ====================
resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.auth-service.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.auth-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.auth-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.auth-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.auth-service.failureRateThreshold=80
resilience4j.circuitbreaker.instances.auth-service.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.user-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.user-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.user-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.user-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.user-service.automaticTransitionFromOpenToHalfOpenEnabled=true
