spring.application.name=api-gateway

# ==================== CORS ====================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[0]=${app.frontend-url:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[1]=http://localhost:3000

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[5]=OPTIONS

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# ==================== Discovery ====================
spring.cloud.gateway.discovery.locator.enabled=false

# ==================== AUTH SERVICE ====================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://auth-service:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/riff/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=auth-service
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# ==================== USER SERVICE ====================
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://user-service:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/riff/api/users/**
# spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
# spring.cloud.gateway.routes[1].filters[0].args.name=user-service
# spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/user

# ==================== NOTIFICATION SERVICE ====================
spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=${NOTIF_SERVICE_URL:http://notification-service:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/riff/api/notifications/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=notification-service
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/notification

# ==================== SERVER ====================
server.port=8080

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}

# ==================== APP ====================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ==================== RESILIENCE4J ====================
resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.auth-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.auth-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.auth-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.auth-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.auth-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.auth-service.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.user-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.user-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.user-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.user-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.user-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.user-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.user-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.user-service.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.notification-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.notification-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.notification-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.notification-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.notification-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.notification-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.notification-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notification-service.eventConsumerBufferSize=10

# ==================== LOGGING ====================
logging.level.iuh.fit.apigateway=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=WARN