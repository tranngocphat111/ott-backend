x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  redis:
    image: redis:7-alpine
    container_name: ott-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ott-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ott-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_MANAGEMENT_BIND:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ott-network

  notification-service:
    image: ${NOTIFICATION_SERVICE_IMAGE:?NOTIFICATION_SERVICE_IMAGE is required}
    container_name: ott-notification
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      NOTIF_DB_URL: ${NOTIF_DB_URL:?NOTIF_DB_URL is required}
      NOTIF_DB_USERNAME: ${NOTIF_DB_USERNAME:?NOTIF_DB_USERNAME is required}
      NOTIF_DB_PASSWORD: ${NOTIF_DB_PASSWORD:?NOTIF_DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME is required}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Riff}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  user-service:
    image: ${USER_SERVICE_IMAGE:?USER_SERVICE_IMAGE is required}
    container_name: ott-user
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      USER_DB_URL: ${USER_DB_URL:?USER_DB_URL is required}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?USER_DB_USERNAME is required}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?USER_DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-86400}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      NOTIF_SERVICE_URL: http://notification-service:8083
      AUTH_SERVICE_URL: http://auth-service:8081
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:?AWS_S3_BUCKET_NAME is required}
      AWS_DEFAULT_AVATAR_URL: ${AWS_DEFAULT_AVATAR_URL:?AWS_DEFAULT_AVATAR_URL is required}
      AWS_DEFAULT_COVER_PHOTO_URL: ${AWS_DEFAULT_COVER_PHOTO_URL:?AWS_DEFAULT_COVER_PHOTO_URL is required}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  auth-service:
    image: ${AUTH_SERVICE_IMAGE:?AUTH_SERVICE_IMAGE is required}
    container_name: ott-auth
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      AUTH_DB_URL: ${AUTH_DB_URL:?AUTH_DB_URL is required}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME:?AUTH_DB_USERNAME is required}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-86400}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      USER_SERVICE_URL: http://user-service:8082
      NOTIF_SERVICE_URL: http://notification-service:8083
      AWS_DEFAULT_AVATAR_URL: ${AWS_DEFAULT_AVATAR_URL:?AWS_DEFAULT_AVATAR_URL is required}
      AWS_DEFAULT_COVER_PHOTO_URL: ${AWS_DEFAULT_COVER_PHOTO_URL:?AWS_DEFAULT_COVER_PHOTO_URL is required}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  media-service:
    image: ${MEDIA_SERVICE_IMAGE:?MEDIA_SERVICE_IMAGE is required}
    container_name: ott-media
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      SOCIAL_DB_URL: ${SOCIAL_DB_URL:?SOCIAL_DB_URL is required}
      SOCIAL_DB_USERNAME: ${SOCIAL_DB_USERNAME:?SOCIAL_DB_USERNAME is required}
      SOCIAL_DB_PASSWORD: ${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      USER_SERVICE_URL: http://user-service:8082
      RELATIONSHIP_SOCKET_HOST: ${RELATIONSHIP_SOCKET_HOST:-0.0.0.0}
      RELATIONSHIP_SOCKET_PORT: ${RELATIONSHIP_SOCKET_PORT:-8091}
      RELATIONSHIP_SOCKET_ORIGIN: ${RELATIONSHIP_SOCKET_ORIGIN:-*}
      AWS_SOCIAL_ACCESS_KEY_ID: ${AWS_SOCIAL_ACCESS_KEY_ID:?AWS_SOCIAL_ACCESS_KEY_ID is required}
      AWS_SOCIAL_SECRET_ACCESS_KEY: ${AWS_SOCIAL_SECRET_ACCESS_KEY:?AWS_SOCIAL_SECRET_ACCESS_KEY is required}
      AWS_SOCIAL_REGION: ${AWS_SOCIAL_REGION:-ap-southeast-1}
      AWS_SOCIAL_S3_BUCKET_NAME: ${AWS_SOCIAL_S3_BUCKET_NAME:?AWS_SOCIAL_S3_BUCKET_NAME is required}
      AWS_SOCIAL_S3_BASE_URL: ${AWS_SOCIAL_S3_BASE_URL:?AWS_SOCIAL_S3_BASE_URL is required}
      AWS_SOCIAL_S3_USE_LOCAL: ${AWS_SOCIAL_S3_USE_LOCAL:-false}
    ports:
      - "127.0.0.1:8091:8091"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  chat-service:
    image: ${CHAT_SERVICE_IMAGE:?CHAT_SERVICE_IMAGE is required}
    container_name: ott-chat
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      FRONTEND_URL_ALT: ${FRONTEND_URL_ALT:-http://localhost:3000}
      FRONTEND_URL_DEPLOYED: ${FRONTEND_URL_DEPLOYED:-https://*.vercel.app}
      CHAT_ALLOWED_ORIGINS: ${CHAT_ALLOWED_ORIGINS:-}
      MONGO_URI: ${MONGO_URI:?MONGO_URI is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:?AWS_S3_BUCKET_NAME is required}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_TEXT_MODEL: ${GROQ_TEXT_MODEL:-}
      GROQ_FALLBACK_MODELS: ${GROQ_FALLBACK_MODELS:-}
      GROQ_STT_MODEL: ${GROQ_STT_MODEL:-}
      GROQ_STT_FALLBACK_MODELS: ${GROQ_STT_FALLBACK_MODELS:-}
      GROQ_STT_LANGUAGE: ${GROQ_STT_LANGUAGE:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-}
      AI_STT_TIMEOUT_MS: ${AI_STT_TIMEOUT_MS:-}
      AI_MAX_AUDIO_BYTES: ${AI_MAX_AUDIO_BYTES:-}
      AI_DISABLE_STRICT_SCHEMA: ${AI_DISABLE_STRICT_SCHEMA:-}
      FFMPEG_PATH: ${FFMPEG_PATH:-}
      PRESENCE_TTL_SECONDS: ${PRESENCE_TTL_SECONDS:-}
      PRESENCE_RECONCILE_INTERVAL_MS: ${PRESENCE_RECONCILE_INTERVAL_MS:-}
      USER_CACHE_TTL: ${USER_CACHE_TTL:-}
      REKOGNITION_MIN_CONFIDENCE: ${REKOGNITION_MIN_CONFIDENCE:-}
      MODERATION_FAIL_CLOSED: ${MODERATION_FAIL_CLOSED:-false}
      MODERATION_RABBITMQ_EXCHANGE: ${MODERATION_RABBITMQ_EXCHANGE:-}
      MODERATION_REVIEW_REQUEST_ROUTING_KEY: ${MODERATION_REVIEW_REQUEST_ROUTING_KEY:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      ANALYTICS_MESSAGE_SENT_QUEUE: ${ANALYTICS_MESSAGE_SENT_QUEUE:-analytics.message.sent.queue}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  analytic-service:
    image: ${ANALYTIC_SERVICE_IMAGE:?ANALYTIC_SERVICE_IMAGE is required}
    container_name: ott-analytic
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ANALYTIC_SERVER_PORT: 8092
      ANALYTIC_DB_URL: ${ANALYTIC_DB_URL:?ANALYTIC_DB_URL is required}
      ANALYTIC_DB_USERNAME: ${ANALYTIC_DB_USERNAME:?ANALYTIC_DB_USERNAME is required}
      ANALYTIC_DB_PASSWORD: ${ANALYTIC_DB_PASSWORD:?ANALYTIC_DB_PASSWORD is required}
      ANALYTIC_RABBITMQ_HOST: rabbitmq
      ANALYTIC_RABBITMQ_PORT: 5672
      ANALYTIC_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      ANALYTIC_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      USER_SERVICE_URL: http://user-service:8082
      ANALYTIC_ALLOWED_ORIGINS: ${ANALYTIC_ALLOWED_ORIGINS:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  moderation-service:
    image: ${MODERATION_SERVICE_IMAGE:?MODERATION_SERVICE_IMAGE is required}
    container_name: ott-moderation
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: ${MODERATION_DB_URL:?MODERATION_DB_URL is required}
      SPRING_DATASOURCE_USERNAME: ${MODERATION_DB_USERNAME:?MODERATION_DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${MODERATION_DB_PASSWORD:?MODERATION_DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      MODERATION_REVIEW_REQUEST_DLQ: ${MODERATION_REVIEW_REQUEST_DLQ:-moderation.review.requests.dlq}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ott-network

  api-gateway:
    image: ${API_GATEWAY_IMAGE:?API_GATEWAY_IMAGE is required}
    container_name: ott-gateway
    restart: unless-stopped
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      FRONTEND_URL_ALT: ${FRONTEND_URL_ALT:-http://localhost:3000}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      NOTIF_SERVICE_URL: http://notification-service:8083
      MEDIA_SERVICE_URL: http://media-service:8090
      CHAT_SERVICE_URL: http://chat-service:5000
      ANALYTIC_SERVICE_URL: http://analytic-service:8092
      FRONTEND_URL_DEPLOYED: ${FRONTEND_URL_DEPLOYED:-https://*.vercel.app}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - auth-service
      - user-service
      - notification-service
      - media-service
      - chat-service
      - analytic-service
      - moderation-service
    networks:
      - ott-network

volumes:
  redis_data:
  rabbitmq_data:

networks:
  ott-network:
    driver: bridge
