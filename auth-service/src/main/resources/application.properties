spring.application.name=auth-service
server.port=8081
server.servlet.context-path=/riff/api

# Database
spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400}
jwt.2fa-temp-expiration=300

# RabbitMQ
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://admin:rabbit123@rabbitmq:5672}
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

rabbitmq.exchange=notification.exchange
rabbitmq.exchange.user-events=user.events
rabbitmq.routing-key.user-login=user.login

# Analytics queues
analytics.queue.user-login=${ANALYTICS_USER_LOGIN_QUEUE:analytics.user.login.queue}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${FRONTEND_URL:http://localhost:5173}/auth/callback/google

# Internal service communication
internal.api-key=${INTERNAL_API_KEY}
internal.user-service-url=${USER_SERVICE_URL:http://user-service:8082}/riff/api
internal.notification-service-url=${NOTIF_SERVICE_URL:http://localhost:8083}/notification/riff

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.iuh.fit.authservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

app.user.default-avatar=${AWS_DEFAULT_AVATAR_URL}
app.user.default-cover-photo=${AWS_DEFAULT_COVER_PHOTO_URL}