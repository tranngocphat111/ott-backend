name: backend microservice ci cd

on:
  push:
    branches:
      - main
    paths:
      - "api-gateway/**"
      - "auth-service/**"
      - "user-service/**"
      - "notification-service/**"
      - "media-service/**"
      - "chat-service/**"
      - "analytic-service/**"
      - "deploy/**"
      - ".dockerignore"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build and deploy all services"
        type: boolean
        required: false
        default: false
      start_instance:
        description: "Start the EC2 instance if it is stopped"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}
  EC2_TAG_NAME: ${{ vars.EC2_TAG_NAME || secrets.EC2_TAG_NAME }}
  IMAGE_PLATFORM: ${{ vars.IMAGE_PLATFORM || 'linux/amd64' }}

jobs:
  changes:
    name: detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - "api-gateway/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            auth-service:
              - "auth-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            user-service:
              - "user-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            notification-service:
              - "notification-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            media-service:
              - "media-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            chat-service:
              - "chat-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"
            analytic-service:
              - "analytic-service/**"
              - "deploy/**"
              - ".dockerignore"
              - ".github/workflows/backend-ci-cd.yml"

      - id: matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_all }}" == "true" ]]; then
            echo 'services=["api-gateway","auth-service","user-service","notification-service","media-service","chat-service","analytic-service"]' >> "$GITHUB_OUTPUT"
          else
            echo 'services=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: build and deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services != '[]'
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required variables
        shell: bash
        run: |
          missing=0
          for name in AWS_ACCOUNT_ID AWS_REGION AWS_DEPLOY_ROLE_ARN EC2_TAG_NAME IMAGE_PLATFORM; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is missing. Add it in GitHub repo Settings -> Secrets and variables -> Actions -> Variables."
              missing=1
            else
              echo "$name is set"
            fi
          done
          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Map service metadata
        id: meta
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            api-gateway)
              echo "dir=api-gateway" >> "$GITHUB_OUTPUT"
              echo "repo=ott-api-gateway" >> "$GITHUB_OUTPUT"
              ;;
            auth-service)
              echo "dir=auth-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-auth-service" >> "$GITHUB_OUTPUT"
              ;;
            user-service)
              echo "dir=user-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-user-service" >> "$GITHUB_OUTPUT"
              ;;
            notification-service)
              echo "dir=notification-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-notification-service" >> "$GITHUB_OUTPUT"
              ;;
            media-service)
              echo "dir=media-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-media-service" >> "$GITHUB_OUTPUT"
              ;;
            chat-service)
              echo "dir=chat-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-chat-service" >> "$GITHUB_OUTPUT"
              ;;
            analytic-service)
              echo "dir=analytic-service" >> "$GITHUB_OUTPUT"
              echo "repo=ott-analytic-service" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown service: ${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

      - name: Build and push image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.meta.outputs.dir }}
          file: ${{ steps.meta.outputs.dir }}/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.meta.outputs.repo }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Resolve EC2 instance
        id: ec2
        shell: bash
        run: |
          INSTANCE_ID="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=$EC2_TAG_NAME" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)"

          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.start_instance }}" == "true" ]]; then
              INSTANCE_ID="$(aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --filters "Name=tag:Name,Values=$EC2_TAG_NAME" "Name=instance-state-name,Values=stopped" \
                --query "Reservations[0].Instances[0].InstanceId" \
                --output text)"

              if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
                echo "Cannot find stopped EC2 instance with tag Name=$EC2_TAG_NAME" >&2
                exit 1
              fi

              aws ec2 start-instances --region "$AWS_REGION" --instance-ids "$INSTANCE_ID" >/dev/null
              aws ec2 wait instance-running --region "$AWS_REGION" --instance-ids "$INSTANCE_ID"
            else
              echo "EC2 is not running. Start it manually, or run workflow_dispatch with start_instance=true." >&2
              exit 1
            fi
          fi

          for attempt in {1..30}; do
            PING_STATUS="$(aws ssm describe-instance-information \
              --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)"

            if [[ "$PING_STATUS" == "Online" ]]; then
              break
            fi

            if [[ "$attempt" == "30" ]]; then
              echo "SSM is not online for $INSTANCE_ID yet. Check EC2 IAM role and SSM Agent." >&2
              exit 1
            fi

            sleep 10
          done

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy service through SSM
        shell: bash
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${{ steps.meta.outputs.repo }}:${{ github.sha }}"
          SERVICE_NAME="${{ matrix.service }}"
          CMD="$(cat <<'EOS'
          set -euo pipefail

          APP_DIR="/opt/ott"
          REPO_DIR=""

          for candidate in /home/ssm-user/ott-backend /home/ubuntu/ott-backend /root/ott-backend; do
            if [ -d "$candidate/.git" ]; then
              REPO_DIR="$candidate"
              break
            fi
          done

          if [ -n "$REPO_DIR" ]; then
            export HOME="${HOME:-/root}"
            git -c safe.directory="$REPO_DIR" -C "$REPO_DIR" fetch origin main
            git -c safe.directory="$REPO_DIR" -C "$REPO_DIR" checkout main
            git -c safe.directory="$REPO_DIR" -C "$REPO_DIR" pull --ff-only origin main

            sudo cp "$REPO_DIR/deploy/docker-compose.prod.yml" "$APP_DIR/docker-compose.prod.yml"
            sudo cp "$REPO_DIR/deploy/deploy-service.sh" "$APP_DIR/deploy-service.sh"
            sudo chmod +x "$APP_DIR/deploy-service.sh"
          else
            echo "No ott-backend git clone found on EC2; using existing /opt/ott deploy files."
          fi

          sudo AWS_REGION="__AWS_REGION__" /opt/ott/deploy-service.sh "__SERVICE_NAME__" "__IMAGE_URI__"
          EOS
          )"
          CMD="${CMD//__AWS_REGION__/$AWS_REGION}"
          CMD="${CMD//__SERVICE_NAME__/$SERVICE_NAME}"
          CMD="${CMD//__IMAGE_URI__/$IMAGE_URI}"
          PARAMS="$(jq -n --arg cmd "$CMD" '{commands:[$cmd]}')"

          COMMAND_ID="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ matrix.service }} from GitHub Actions" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"
          WAIT_EXIT=$?

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json

          exit "$WAIT_EXIT"
