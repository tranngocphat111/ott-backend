spring.application.name=user-service
server.port=8082
server.servlet.context-path=/riff/api

# ?? Database ??????????????????????????????????????????????
spring.datasource.url=${USER_DB_URL}
spring.datasource.username=${USER_DB_USERNAME}
spring.datasource.password=${USER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? RabbitMQ ??????????????????????????????????????????????
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

# Routing keys (ph?i kh?p v?i notification-service config)
rabbitmq.exchange.notification=notification.exchange
rabbitmq.routing-key.welcome=notification.welcome
rabbitmq.routing-key.alert=notification.alert

# ?? JWT ??????????
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400}

# ?? Internal communication ????????????????????????????????
internal.api.key=${INTERNAL_API_KEY}
services.notification.url=${NOTIF_SERVICE_URL:http://notification-service:8083}/notification/riff

# ?? OTP ???????????????????????????????????????????????????
otp.expiry-minutes=5
otp.length=6
otp.max-attempts=5
otp.rate-limit-per-hour=999999

# ?? Logging ???????????????????????????????????????????????
logging.level.iuh.fit.userservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN