spring.application.name=mediaServices
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8090
server.servlet.context-path=/media/api

# Jackson – cho phép null map vào primitive boolean khi field vắng trong JSON
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Database Configuration
spring.datasource.url=${SOCIAL_DB_URL}
spring.datasource.username=${SOCIAL_DB_USERNAME}
spring.datasource.password=${SOCIAL_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# Naming stategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false


# File Upload Configuration
spring.servlet.multipart.enabled=true
# ??t gi� tr? -1 ?? KH�NG GI?I H?N dung l??ng (Unlimited)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

server.tomcat.max-part-count=-1

# T�y ch?n: T?ng gi?i h?n d? li?u form (ch?ng l?i tr�n form)
server.tomcat.max-http-form-post-size=-1



# Redis Server Settings
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis123}

# Lettuce Connection Pool Settings
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

user.events.exchange=user.events
user.created.queue=user.created.queue
user.created.routing-key=user.created
user.updated.queue=user.updated.queue.media
user.updated.routing-key=user.updated

# Internal user-service sync
internal.api.key=${INTERNAL_API_KEY}
services.user.url=${USER_SERVICE_URL:http://ott-user:8082}/riff/api

# Media compression queue
media.compression.exchange=media.compression.exchange
media.compression.queue=media.compression.queue
media.compression.routing-key=media.compression.routing-key

# Media upload queue
media.upload.exchange=media.upload.exchange
media.upload.queue=media.upload.queue
media.upload.routing-key=media.upload.routing-key

# Moderation queue
moderation.rabbitmq.exchange=${MODERATION_RABBITMQ_EXCHANGE:moderation.events}
moderation.rabbitmq.routing-key.review-request=${MODERATION_REVIEW_REQUEST_ROUTING_KEY:moderation.review.requests.queue}

# Media delete queue
media.delete.exchange=media.delete.exchange
media.delete.queue=media.delete.queue
media.delete.routing-key=media.delete.routing-key

# Realtime Socket.IO (media-service)
relationship.socket.host=${RELATIONSHIP_SOCKET_HOST:0.0.0.0}
relationship.socket.port=${RELATIONSHIP_SOCKET_PORT:8091}
relationship.socket.origin=${RELATIONSHIP_SOCKET_ORIGIN:*}


# AWS S3 Configuration
# Account ID : 642058032746
# Bucket     : social-riff-app-demo  (ap-southeast-1)
aws.social.s3.access-key=${AWS_SOCIAL_ACCESS_KEY_ID}
aws.social.s3.secret-key=${AWS_SOCIAL_SECRET_ACCESS_KEY}
aws.social.s3.region=${AWS_SOCIAL_REGION:ap-southeast-1}
aws.social.s3.bucket-name=${AWS_SOCIAL_S3_BUCKET_NAME:social-riff-app}
# Set to true to use LocalStack / MinIO for local development
aws.social.s3.use-local=${AWS_SOCIAL_S3_USE_LOCAL:false}
aws.social.s3.local-endpoint=${AWS_SOCIAL_S3_LOCAL_ENDPOINT:http://localhost:4566}

# S3 Base URL - Used to construct full URLs from filenames
aws.s3.base-url=${AWS_SOCIAL_S3_BASE_URL:https://social-riff-app-demo.s3.ap-southeast-1.amazonaws.com}

# S3 TransferManager tuning
aws.s3.transfer.multipart-threshold-mb=16
aws.s3.transfer.part-size-mb=8
aws.s3.transfer.max-threads=16

# S3 folder structure
aws.s3.folder.posts=posts
aws.s3.folder.stories=stories
aws.s3.folder.avatars=avatars
aws.s3.folder.covers=covers
aws.s3.folder.videos=videos
aws.s3.folder.music=music

# Analytics queues
analytics.queue.post-created=${ANALYTICS_POST_CREATED_QUEUE:analytics.post.created.queue}


rabbitmq.exchange.notification=notification.exchange
rabbitmq.routing-key.inapp=notification.inapp
