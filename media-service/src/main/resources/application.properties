spring.application.name=mediaServices
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8090
server.servlet.context-path=/media/api

# Jackson – cho phép null map vào primitive boolean khi field vắng trong JSON
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Database Configuration
spring.datasource.url=${SOCIAL_DB_URL:jdbc:postgresql://ep-calm-waterfall-a1v4nq7x-pooler.ap-southeast-1.aws.neon.tech/db_social?sslmode=require}
spring.datasource.username=${SOCIAL_DB_USERNAME:neondb_owner}
spring.datasource.password=${SOCIAL_DB_PASSWORD:npg_8retqHOipvf5}
spring.datasource.driver-class-name=org.postgresql.Driver


# Naming stategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB



# Redis Server Settings
spring.data.redis.url=${REDIS_URL:redis://:redis123@localhost:6379/0}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis123}

# Lettuce Connection Pool Settings
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Realtime Socket.IO (media-service)
relationship.socket.host=${RELATIONSHIP_SOCKET_HOST:0.0.0.0}
relationship.socket.port=${RELATIONSHIP_SOCKET_PORT:8091}


# AWS S3 Configuration
# Account ID : 642058032746
# Bucket     : social-riff-app-demo  (ap-southeast-1)
aws.social.s3.access-key=${AWS_SOCIAL_ACCESS_KEY_ID:AKIAZK7NECZVK4HC6NG5}
aws.social.s3.secret-key=${AWS_SOCIAL_SECRET_ACCESS_KEY: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}
aws.social.s3.region=${AWS_SOCIAL_REGION:us-east-1}
aws.social.s3.bucket-name=${AWS_SOCIAL_S3_BUCKET_NAME:social-riff-app-demo}
# Set to true to use LocalStack / MinIO for local development
aws.social.s3.use-local=${AWS_SOCIAL_S3_USE_LOCAL:false}
aws.social.s3.local-endpoint=${AWS_SOCIAL_S3_LOCAL_ENDPOINT:http://localhost:4566}

# S3 Base URL - Used to construct full URLs from filenames
aws.s3.base-url=${AWS_SOCIAL_S3_BASE_URL:https://social-riff-app-demo.s3.us-east-1.amazonaws.com}

# S3 folder structure
aws.s3.folder.posts=posts
aws.s3.folder.stories=stories
aws.s3.folder.avatars=avatars
aws.s3.folder.covers=covers
aws.s3.folder.videos=videos
aws.s3.folder.music=music

