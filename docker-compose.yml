version: "3.8"

services:
  analytic-postgres:
    image: postgres:15-alpine
    container_name: analytic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ANALYTIC_DB_NAME:-admin_analytic_db}
      POSTGRES_USER: ${ANALYTIC_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${ANALYTIC_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - analytic_postgres_data:/var/lib/postgresql/data
    networks:
      - ott-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ANALYTIC_DB_USERNAME:-postgres} -d ${ANALYTIC_DB_NAME:-admin_analytic_db}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ott-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ott-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ott-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ott-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5

  notification-service:
    build: ./notification-service
    container_name: ott-notification
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: ott-user
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_started

  auth-service:
    build: ./auth-service
    container_name: ott-auth
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started

  media-service:
    build: ./media-service
    container_name: ott-media
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy

  chat-service:
    build: ./chat-service
    container_name: ott-chat
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${CHAT_SERVICE_PORT}
      MONGO_URI: ${CHAT_MONGO_URI}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "5000:5000"
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytic-service:
    build: ./analytic-service
    container_name: ott-analytic
    restart: unless-stopped
    env_file: .env
    ports:
      - "8092:8092"
    environment:
      ANALYTIC_SERVER_PORT: ${ANALYTIC_SERVER_PORT:-8092}
      ANALYTIC_DB_URL: jdbc:postgresql://analytic-postgres:5432/${ANALYTIC_DB_NAME:-admin_analytic_db}
      ANALYTIC_DB_USERNAME: ${ANALYTIC_DB_USERNAME:-postgres}
      ANALYTIC_DB_PASSWORD: ${ANALYTIC_DB_PASSWORD:-postgres}
      ANALYTIC_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      ANALYTIC_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      ANALYTIC_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      ANALYTIC_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbit123}
      ANALYTIC_ALLOWED_ORIGINS: ${ANALYTIC_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://ott-user:8082}
    networks:
      - ott-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      analytic-postgres:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: ott-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - ott-network
    depends_on:
      - auth-service
      - user-service
      - notification-service
      - media-service

volumes:
  analytic_postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ott-network:
    driver: bridge
