version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ott-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ott-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ott-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ott-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  notification-service:
    build: ./notification-service
    container_name: ott-notification
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: ott-user
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_started

  auth-service:
    build: ./auth-service
    container_name: ott-auth
    restart: unless-stopped
    env_file: .env
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started

  media-service:
    build: ./media-service
    container_name: ott-media
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:8090"
      - "8091:8091"
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy

  chat-service:
    build: ./chat-service
    container_name: ott-chat
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${CHAT_SERVICE_PORT}
      MONGO_URI: ${CHAT_MONGO_URI}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "5000:5000"
    networks:
      - ott-network
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: ott-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - ott-network
    depends_on:
      - auth-service
      - user-service
      - notification-service
      - media-service

volumes:
  redis_data:
  rabbitmq_data:

networks:
  ott-network:
    driver: bridge
