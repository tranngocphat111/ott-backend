spring.application.name=analytic-service

server.port=${ANALYTIC_SERVER_PORT:8092}

# PostgreSQL
spring.datasource.url=${ANALYTIC_DB_URL:jdbc:postgresql://localhost:5432/admin_analytic_db}
spring.datasource.username=${ANALYTIC_DB_USERNAME:postgres}
spring.datasource.password=${ANALYTIC_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=${ANALYTIC_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${ANALYTIC_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${ANALYTIC_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${ANALYTIC_RABBITMQ_PASSWORD:rabbit123}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=5000

# Service-to-service (Feign)
user-service.url=http://localhost:8082

# CORS
app.cors.allowed-origins=${ANALYTIC_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}