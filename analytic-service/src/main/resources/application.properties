spring.application.name=analytic-service

server.port=${ANALYTIC_SERVER_PORT:8092}

jwt.secret=${JWT_SECRET}

# PostgreSQL
spring.datasource.url=${ANALYTIC_DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/admin_analytic_db}}
spring.datasource.username=${ANALYTIC_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${ANALYTIC_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
spring.datasource.hikari.maximum-pool-size=${ANALYTIC_DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${ANALYTIC_DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${ANALYTIC_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${ANALYTIC_DB_MAX_LIFETIME_MS:600000}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis cache
spring.data.redis.host=${ANALYTIC_REDIS_HOST:${REDIS_HOST:redis}}
spring.data.redis.port=${ANALYTIC_REDIS_PORT:${REDIS_PORT:6379}}
spring.data.redis.repositories.enabled=false
spring.data.redis.password=${ANALYTIC_REDIS_PASSWORD:${REDIS_PASSWORD:}}
analytics.cache.enabled=${ANALYTICS_CACHE_ENABLED:true}
analytics.cache.dashboard-ttl-seconds=${ANALYTICS_CACHE_DASHBOARD_TTL_SECONDS:60}
# RabbitMQ
spring.rabbitmq.host=${ANALYTIC_RABBITMQ_HOST:${RABBITMQ_HOST:rabbitmq}}
spring.rabbitmq.port=${ANALYTIC_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${ANALYTIC_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:admin}}
spring.rabbitmq.password=${ANALYTIC_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:rabbit123}}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=5000
analytics.rabbitmq.exchange.moderation=${MODERATION_RABBITMQ_EXCHANGE:moderation.events}
analytics.rabbitmq.queue.content-violation=${ANALYTICS_CONTENT_VIOLATION_QUEUE:analytics.content.violation.queue}
analytics.rabbitmq.routing-key.content-violation=${MODERATION_VIOLATION_DETECTED_ROUTING_KEY:moderation.violation.detected}
analytics.rabbitmq.dlq.content-violation=${ANALYTICS_CONTENT_VIOLATION_DLQ:analytics.content.violation.dlq}
analytics.rabbitmq.queue.admin-audit=${ANALYTICS_ADMIN_AUDIT_QUEUE:analytics.admin.audit.queue}
analytics.rabbitmq.routing-key.admin-audit=${MODERATION_ADMIN_AUDIT_ROUTING_KEY:moderation.admin.audit}
analytics.rabbitmq.dlq.admin-audit=${ANALYTICS_ADMIN_AUDIT_DLQ:analytics.admin.audit.dlq}

# Daily aggregate jobs
analytics.daily-stats.enabled=${ANALYTICS_DAILY_STATS_ENABLED:true}
analytics.daily-stats.cron=${ANALYTICS_DAILY_STATS_CRON:0 5 * * * *}
analytics.daily-stats.zone=${ANALYTICS_DAILY_STATS_ZONE:UTC}
analytics.daily-stats.lookback-days=${ANALYTICS_DAILY_STATS_LOOKBACK_DAYS:2}

# Raw event archive to S3. Disabled by default so deployments without S3 config stay healthy.
analytics.archive.enabled=${ANALYTICS_ARCHIVE_ENABLED:false}
analytics.archive.cron=${ANALYTICS_ARCHIVE_CRON:0 0 4 * * *}
analytics.archive.zone=${ANALYTICS_ARCHIVE_ZONE:Asia/Ho_Chi_Minh}
analytics.archive.retention-days=${ANALYTICS_ARCHIVE_RETENTION_DAYS:0}
analytics.archive.max-rows-per-file=${ANALYTICS_ARCHIVE_MAX_ROWS_PER_FILE:50000}
analytics.archive.s3.bucket-name=${ANALYTICS_ARCHIVE_S3_BUCKET_NAME:}
analytics.archive.s3.region=${ANALYTICS_ARCHIVE_S3_REGION:ap-southeast-1}
analytics.archive.s3.prefix=${ANALYTICS_ARCHIVE_S3_PREFIX:analytics/raw-events}
analytics.archive.s3.endpoint=${ANALYTICS_ARCHIVE_S3_ENDPOINT:}
analytics.archive.s3.path-style-access-enabled=${ANALYTICS_ARCHIVE_S3_PATH_STYLE_ACCESS_ENABLED:false}

# DLQ monitoring
analytics.dlq-monitor.enabled=${ANALYTICS_DLQ_MONITOR_ENABLED:true}
analytics.dlq-monitor.cron=${ANALYTICS_DLQ_MONITOR_CRON:0 */5 * * * *}
analytics.dlq-monitor.warn-threshold=${ANALYTICS_DLQ_WARN_THRESHOLD:1}

# Service-to-service (Feign)
user-service.url=${USER_SERVICE_URL:http://ott-user:8082/riff/api}
internal.api.key=${INTERNAL_API_KEY:}

# CORS
app.cors.allowed-origins=${ANALYTIC_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://riff-iuh.vercel.app}
