spring.application.name=notification-service
server.port=8083
server.servlet.context-path=/notification/riff

# ==================== DATABASE ====================
spring.datasource.url=${NOTIF_DB_URL}
spring.datasource.username=${NOTIF_DB_USERNAME}
spring.datasource.password=${NOTIF_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==================== REDIS ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.data.redis.ssl.enabled=false
spring.cache.type=redis

otp.cache.ttl=300
otp.rate-limit.max-per-hour=100

# ==================== RABBITMQ ====================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}
spring.rabbitmq.virtual-host=/

rabbitmq.exchange.notification=notification.exchange
rabbitmq.queue.otp=notification.otp.queue
rabbitmq.queue.welcome=notification.welcome.queue
rabbitmq.queue.alert=notification.alert.queue
rabbitmq.routing-key.otp=notification.otp
rabbitmq.routing-key.welcome=notification.welcome
rabbitmq.routing-key.alert=notification.alert

# ==================== EMAIL ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:noreply@riff.com}
app.mail.from-name=${MAIL_FROM_NAME:Riff}

app.name=Riff
app.website=http://localhost:5173
app.support-email=support@riff.com

otp.expiry-minutes=5

# ==================== THYMELEAF ====================
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==================== INTERNAL ====================
internal.api.key=${INTERNAL_API_KEY}

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.iuh.fit.notificationservice=DEBUG
logging.level.org.springframework.amqp=INFO
rabbitmq.queue.inapp=notification.inapp.queue
rabbitmq.routing-key.inapp=notification.inapp
